<div class="login-wrapper">
  <div class="container">
    <div class="card">
      <div class="icon-container">🚗</div>
      <h2>Iniciar Sesión</h2>

      <div class="input-group">
        <input type="text" class="input-field" placeholder="Usuario" [(ngModel)]="usuario">
      </div>
      <div class="input-group">
        <input type="password" class="input-field" placeholder="Contraseña" [(ngModel)]="password">
      </div>

      <button class="btn-primary" (click)="login()">Entrar</button>

      @if (error) {
        <p class="error">Usuario o contraseña incorrectos</p>
      }

      <div class="footer-link">
        ¿No tienes cuenta? <a (click)="irARegistro()">Regístrate</a>
      </div>

    </div>
  </div>
</div>
