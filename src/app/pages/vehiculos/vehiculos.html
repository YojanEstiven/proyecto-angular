<div class="container">

  <h2>🚗 Gestión de Vehículos</h2>

  <!-- FORMULARIO -->
  <div class="form">
    <input type="text" placeholder="Placa" [(ngModel)]="placa">
    
    <select [(ngModel)]="tipo">
      <option value="">Seleccione tipo</option>
      <option value="Carro">Carro</option>
      <option value="Moto">Moto</option>
    </select>

    <button (click)="agregarVehiculo()">Agregar</button>
  </div>

  <!-- LISTA -->
  <div class="lista">
    <div *ngFor="let v of vehiculos; let i = index" class="item">
      <span>{{ v.placa }} - {{ v.tipo }}</span>
      <button (click)="eliminarVehiculo(i)">Borrar</button>
    </div>
  </div>

</div>
