<div class="page-container">
  
  <header class="page-header">
    <div class="header-icon">🚙</div>
    <div class="header-info">
      <h1>Gestión de Vehículos</h1>
      <p>Registra y administra la flota de vehículos autorizados.</p>
    </div>
  </header>

  <!-- Formulario Superior -->
  <section class="card form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>Placa del Vehículo</label>
        <input type="text" placeholder="Ej: ABC-123" [(ngModel)]="placa" class="form-control">
      </div>
      <div class="form-group">
        <label>Tipo de Vehículo</label>
        <select [(ngModel)]="tipo" class="form-control">
          <option value="">Seleccione tipo</option>
          <option value="Carro">Carro</option>
          <option value="Moto">Moto</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn-primary" (click)="guardarVehiculo()">
          {{ editandoIndex !== null ? 'Actualizar Vehículo' : 'Registrar Vehículo' }}
        </button>
        <button *ngIf="editandoIndex !== null" class="btn-ghost" (click)="limpiar()">Cancelar</button>
      </div>
    </div>
    <div *ngIf="mensajeError" class="error-msg">⚠️ {{ mensajeError }}</div>
  </section>

  <!-- Grid de Vehículos -->
  <main class="grid-layout">
    <div *ngFor="let v of vehiculos; let i = index" class="card vehicle-card" [class.parked]="estaParqueado(v.placa)">
      <div class="card-header">
        <span class="vehicle-icon">{{ v.tipo === 'Carro' ? '🚗' : '🏍️' }}</span>
        <span class="status-badge" [class.badge-parked]="estaParqueado(v.placa)">
          {{ estaParqueado(v.placa) ? 'Parqueado' : 'Disponible' }}
        </span>
      </div>
      <div class="card-body">
        <h2 class="placa-display">{{ v.placa }}</h2>
        <span class="type-label">{{ v.tipo }}</span>
      </div>
      <div class="card-actions">
        <button class="btn-icon edit" (click)="editarVehiculo(i)" title="Editar">✏️</button>
        <button class="btn-icon delete" (click)="eliminarVehiculo(i)" title="Eliminar">🗑️</button>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="vehiculos.length === 0" class="empty-state-card">
      <div class="empty-icon">📂</div>
      <p>No hay vehículos registrados en el sistema.</p>
    </div>
  </main>
</div>
