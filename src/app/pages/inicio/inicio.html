<div class="top-bar">
  <button (click)="logout()">Cerrar sesión</button>
</div>

<div class="main-wrapper">
  <div class="header">
    <h1>Sistema de Parqueadero</h1>
    <p class="welcome">Gestiona tus reservas y espacios rápidamente</p>
  </div>

  <div class="container">
    <div class="menu">
      
      <!-- Card Vehiculos -->
      <div class="content-card card-blue" (click)="irVehiculos()">
        <div class="card-icon">🚙</div>
        <div class="card-info">
          <h3>Mis Vehículos</h3>
          <p>Gestionar flota</p>
        </div>
      </div>

      <!-- Card Ingreso -->
      <div class="content-card card-green" (click)="irIngreso()">
        <div class="card-icon">📥</div>
        <div class="card-info">
          <h3>Ingreso</h3>
          <span class="badge badge-success">Disponible</span>
        </div>
      </div>

      <!-- Card Salida -->
      <div class="content-card card-red" (click)="irSalida()">
        <div class="card-icon">📤</div>
        <div class="card-info">
          <h3>Salida</h3>
          <span class="badge badge-danger">Ocupado</span>
        </div>
      </div>

      <!-- Card Historial -->
      <div class="content-card card-yellow" (click)="irHistorial()">
        <div class="card-icon">📅</div>
        <div class="card-info">
          <h3>Historial</h3>
          <p>Ver reservas recientes</p>
        </div>
      </div>

      <!-- Card Config -->
      <div class="content-card card-gray" (click)="irConfiguracion()">
        <div class="card-icon">⚙️</div>
        <div class="card-info">
          <h3>Configuración</h3>
          <p>Ajustes del sistema</p>
        </div>
      </div>

    </div>
  </div>

  <p class="footer">Sistema de Parqueadero &copy; 2026</p>
</div>
