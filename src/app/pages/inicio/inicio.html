
<nav class="navbar" *ngIf="!isHome">
  <div class="nav-container">
    <div class="nav-logo" (click)="navigate('/')">
      <span class="logo-icon">🅿️</span>
      <span class="logo-text">PARQUEA</span>
    </div>
    
    <div class="nav-menu">
      <a *ngFor="let item of navItems" 
         [routerLink]="item.path" 
         routerLinkActive="active" 
         class="nav-link">
        <span class="link-icon">{{item.icon}}</span>
        <span class="link-text">{{item.label}}</span>
      </a>
    </div>

    <div class="nav-actions">
      <button class="logout-btn-nav" (click)="logout()">Cerrar Sesión</button>
    </div>
  </div>
</nav>

<div class="main-wrapper" [class.active-module]="!isHome">
  
  <!-- VISTA DE INICIO (CARDS) -->
  <div class="home-container" *ngIf="isHome">
    <div class="top-header">
      <button class="logout-pill" (click)="logout()">Cerrar Sesión</button>
    </div>

    <header class="hero-section">
      <div class="hero-content">
        <span class="hero-badge">Gestión Inteligente</span>
        <h1>Control de Parqueadero</h1>
        <p>Selecciona una opción para comenzar la gestión de espacios.</p>
      </div>
    </header>

    <main class="grid-container">
      <div class="cards-grid">
        <div *ngFor="let item of navItems" 
             class="card-modern" 
             [ngClass]="item.iconClass"
             (click)="navigate(item.path)">
          <div class="card-bg-decoration"></div>
          <div class="card-icon-wrapper">
            {{item.icon}}
          </div>
          <div class="card-body">
            <h3>{{item.label}}</h3>
            <p>{{item.desc}}</p>
            <span *ngIf="item.badge" class="status-badge" [ngClass]="item.badge === 'Disponible' ? 'status-ok' : 'status-busy'">
              {{item.badge}}
            </span>
          </div>
          <div class="card-footer">
            <span>Acceder</span>
            <span class="arrow-icon">→</span>
          </div>
        </div>
      </div>
    </main>

    <footer class="home-footer">
      <p>Sistema de Parqueadero &bull; 2026</p>
    </footer>
  </div>

  <div class="module-outlet" *ngIf="!isHome">
    <div class="outlet-wrapper">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
